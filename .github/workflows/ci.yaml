name: C++ Build & Test

on:
  push:
    branches: [ add-gtests ]
  pull_request:
    branches: [ add-gtests ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.22.1'

      - name: Configure with FetchContent googletest
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Debug ..

      - name: Build
        run: cmake --build build --config Debug -- -j 2

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure
